name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]  # 當推播到 main 或 master 分支時自動執行
  # 允許從 GitHub Actions 介面手動觸發部署
  workflow_dispatch:

# 設定 GitHub Token 權限，允許將內容部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      # 為了讓網址不用輸入 /main.html 也能開啟，將它複製一份命名為 index.html
      - name: Copy main.html to index.html
        run: cp main.html index.html
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上傳整個資料夾作為靜態網頁內容
          path: '.' 
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
